# fly.toml app configuration file generated for confidantsense on 2026-07-10T15:09:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# Requires a persistent volume named "confidant_data" mounted at /data
# (see [[mounts]] below) -- create it once with:
#   fly volumes create confidant_data --region lhr --size 1
# (1GB is far more than this SQLite-backed MVP needs.) Without this
# volume, CONFIDANT_DB_PATH (set in the Dockerfile) would still write
# into the container's own ephemeral filesystem, and session history
# would be lost on every restart/redeploy -- see src/api/db.py's module
# docstring.

app = 'confidantsense'
primary_region = 'lhr'

[env]
  # OPENROUTER_MODEL deliberately left UNSET here (2026-07-18, see
  # engine/decisions.md "Per-component paid model pinning"). It used to
  # pin one model (openai/gpt-4o-mini) uniformly across every component;
  # that's now handled per-component by src/llm/providers.py's own
  # _DEFAULT_COMPONENT_MODELS map, so setting OPENROUTER_MODEL here would
  # override -- and flatten -- that per-component tuning back to a
  # single model, exactly like it did before. Only set this var
  # (temporarily, for a specific run) when you deliberately want every
  # component forced to one model, e.g. reproducing a calibration
  # workflow's controlled-comparison setup in production.

[build]

[[mounts]]
  source = 'confidant_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

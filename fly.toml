# Fly.io app config for the Confidant MVP API server.
#
# `app` below is a PLACEHOLDER -- Fly app names are globally unique, so
# this will very likely need to change to whatever name you actually
# reserve when you run `fly apps create`. Update it here to match.
#
# Requires a persistent volume named "confidant_data" mounted at /data
# (see [[mounts]] below) -- create it once with:
#   fly volumes create confidant_data --region iad --size 1
# (1GB is far more than this SQLite-backed MVP needs.) Without this
# volume, CONFIDANT_DB_PATH (set in the Dockerfile) would still write
# into the container's own ephemeral filesystem, and session history
# would be lost on every restart/redeploy -- see src/api/db.py's module
# docstring.
app = "confidant-sensemaking"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "confidant_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

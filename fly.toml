# fly.toml app configuration file generated for confidantsense on 2026-07-10T15:09:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'confidantsense'
primary_region = 'lhr'

[build]

[[mounts]]
  source = 'confidant_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

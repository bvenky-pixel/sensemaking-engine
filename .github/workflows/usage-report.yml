name: Usage report

# Manual only (2026-07-19, backlog #230, see engine/decisions.md
# "Production observability beyond opt-in UsageTracker") -- runs
# scripts/usage_report.py directly against the production Fly.io
# machine (confidantsense) via `flyctl ssh console`, same pattern as
# backfill-knowledge-item-ids.yml/learning-computation.yml/
# pom-computation.yml/backup-database.yml. Read-only against the live
# database -- prints its report straight to the workflow's own log, no
# artifact needed (it's meant to be read directly, not downloaded).
#
# Requires a FLY_API_TOKEN repo secret (Settings -> Secrets and
# variables -> Actions), same as the other flyctl-based workflows.
on:
  workflow_dispatch:
    inputs:
      since:
        description: "Only include records at/after this ISO timestamp (blank = all-time)"
        required: false
        default: ""

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Wake the machine
        # fly.toml sets auto_stop_machines/min_machines_running=0 -- the
        # app scales to zero when idle. `flyctl ssh console` connects
        # directly over Fly's private network and does NOT go through
        # the HTTP proxy's auto_start_machines wake-up, so a stopped
        # machine must be started explicitly first.
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          MACHINE_ID=$(flyctl machine list --app confidantsense --json | python3 -c "import json,sys; print(json.load(sys.stdin)[0]['id'])")
          echo "machine_id=$MACHINE_ID" >> "$GITHUB_ENV"
          flyctl machine start "$MACHINE_ID" --app confidantsense
          flyctl machine wait "$MACHINE_ID" --app confidantsense --state started --wait-timeout 60s

      - name: Run usage report against production
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          SINCE_INPUT: ${{ github.event.inputs.since }}
        run: |
          if [ -n "$SINCE_INPUT" ]; then
            flyctl ssh console --app confidantsense --command "python scripts/usage_report.py --since $SINCE_INPUT"
          else
            flyctl ssh console --app confidantsense --command "python scripts/usage_report.py"
          fi

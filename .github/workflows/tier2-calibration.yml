name: Tier 2 calibration

# Manual only -- each run makes real, billable calls (up to 5 stages per
# turn: Interpretation, Judgment, Planner, Response, and Tier 2 when a
# recompute is due; 5 turns total across 4 short scenarios) to the
# configured LLM provider. See scripts/run_tier2_calibration.py's module
# docstring for why this exists: Tier 2 synthesis shipped as a fully
# tested MECHANISM (candidate selection, caching, grounding enforcement,
# non-blocking failure) with zero live data on whether the actual
# synthesis prompt produces useful statements, or over-synthesizes
# tenuous connections, on a real model.
on:
  workflow_dispatch:
    inputs:
      openrouter_model:
        description: "OPENROUTER_MODEL override (blank = provider default 'openrouter/free')"
        required: false
        default: ""

jobs:
  calibration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Tier 2 calibration
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL_INPUT: ${{ github.event.inputs.openrouter_model }}
          CONFIDANT_TRACK_USAGE: "1"
        run: |
          if [ -n "$OPENROUTER_MODEL_INPUT" ]; then
            export OPENROUTER_MODEL="$OPENROUTER_MODEL_INPUT"
          fi
          python scripts/run_tier2_calibration.py

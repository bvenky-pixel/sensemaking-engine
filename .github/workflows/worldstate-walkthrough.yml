name: WorldState walkthrough

# Manual only -- each run makes four real, billable calls per transcript
# turn (Interpretation, Judgment, Planner, Response Generator; 10 turns)
# to the configured LLM provider.
on:
  workflow_dispatch:
    inputs:
      openrouter_model:
        description: "OPENROUTER_MODEL override (blank = provider default)"
        required: false
        default: ""
      mode:
        description: "Counseling mode (vent/strategize/commit/explore/realign, blank = none)"
        required: false
        default: ""

jobs:
  walkthrough:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run end-to-end WorldState walkthrough
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL_INPUT: ${{ github.event.inputs.openrouter_model }}
          WALKTHROUGH_MODE: ${{ github.event.inputs.mode }}
          CONFIDANT_TRACK_USAGE: "1"
        run: |
          if [ -n "$OPENROUTER_MODEL_INPUT" ]; then
            export OPENROUTER_MODEL="$OPENROUTER_MODEL_INPUT"
          fi
          python scripts/run_worldstate_walkthrough.py
